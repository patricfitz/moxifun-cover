<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Moxifun | Zero Inertia Technology</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('web_cover.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .content {
            position: absolute;
            bottom: 5%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
        }
        h1 {
            color: #2a3a4a;
            font-size: 2rem;
            font-weight: 300;
            margin: 0;
            text-shadow: 0 0 2px rgba(0,0,0,0.2);
        }
        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            color: #2a3a4a;
            text-decoration: none;
            border: 1px solid #2a3a4a;
            border-radius: 2rem;
            background: rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn:hover {
            background: rgba(0,0,0,0.4);
            color: #3a5a6a;
        }
    </style>
</head>
<body>
    <div class="cover"></div>
    <div class="content">
        <h1>Zero Inertia</h1>
        <a href="https://patricfitz.github.io/zero-inertia-demo/" class="btn">View the Demonstration</a>
    </div>
</body>
</html>
